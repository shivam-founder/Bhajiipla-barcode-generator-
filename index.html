<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Barcode Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f0ece4;
    --paper: #faf8f4;
    --ink: #1a1714;
    --ink-soft: #5a5550;
    --ink-muted: #9a9590;
    --accent: #c8401a;
    --accent-light: #f5ede9;
    --border: #d8d4cc;
    --shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    color: var(--ink);
  }

  /* Subtle dot-grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #b8b4ac 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  /* Header */
  header {
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }

  .header-icon {
    width: 48px;
    height: 48px;
    background: var(--ink);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-icon svg { display: block; }

  .header-text h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .header-text p {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Card */
  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: var(--shadow);
  }

  /* Format selector */
  .format-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
    background: var(--bg);
  }

  .format-tab {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s ease;
    text-transform: uppercase;
  }

  .format-tab.active {
    background: var(--ink);
    color: #fff;
  }

  .format-tab:not(.active):hover {
    background: var(--border);
    color: var(--ink);
  }

  /* Input area */
  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .field-hint {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    color: var(--ink-muted);
    text-transform: none;
    letter-spacing: 0;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 400;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.05em;
  }

  input[type="text"]:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,23,20,0.08);
  }

  input[type="text"].error {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,64,26,0.1);
  }

  .error-msg {
    font-size: 12px;
    color: var(--accent);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Options row */
  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  .option-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: block;
  }

  select, input[type="number"] {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    font-size: 12px;
    color: var(--ink-soft);
  }

  select:focus, input[type="number"]:focus {
    border-color: var(--ink);
  }

  /* Checkboxes */
  .checkbox-row {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink-soft);
    user-select: none;
  }

  .checkbox-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--ink);
    cursor: pointer;
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px 20px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .gen-btn:hover { background: #2e2b28; }
  .gen-btn:active { transform: scale(0.99); }

  /* Output area */
  .output-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: none;
    animation: slideUp 0.25s ease forwards;
  }

  .output-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }

  .output-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .output-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
  }

  .barcode-stage {
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff;
  }

  .barcode-wrap {
    background: #fff;
    padding: 20px 24px 16px;
    border: 1px solid #e8e4e0;
    border-radius: 4px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .barcode-wrap svg {
    max-width: 100%;
    display: block;
  }

  /* Download buttons */
  .dl-row {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .dl-btn {
    flex: 1;
    padding: 9px 14px;
    border-radius: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    text-decoration: none;
  }

  .dl-svg {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--ink);
  }
  .dl-svg:hover { border-color: var(--ink); background: var(--ink); color: #fff; }

  .dl-png {
    background: var(--ink);
    border: 1.5px solid var(--ink);
    color: #fff;
  }
  .dl-png:hover { background: #333; }

  /* Info box */
  .info-box {
    background: var(--accent-light);
    border: 1px solid #e8c0b4;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: #7a2810;
    margin-top: 16px;
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.6;
  }

  .info-box.visible { display: block; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* Footer note */
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 28px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="3"  y="6" width="3" height="16" fill="white"/>
        <rect x="8"  y="6" width="1.5" height="16" fill="white"/>
        <rect x="11" y="6" width="3" height="16" fill="white"/>
        <rect x="16" y="6" width="1.5" height="16" fill="white"/>
        <rect x="19" y="6" width="2" height="16" fill="white"/>
        <rect x="23" y="6" width="2" height="16" fill="white"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>BARCODE GENERATOR</h1>
      <p>Code 128 · EAN-13 · SVG &amp; PNG export</p>
    </div>
  </header>

  <div class="card">
    <!-- Format Tabs -->
    <div class="format-tabs">
      <button class="format-tab active" data-fmt="CODE128" onclick="setFormat(this)">Code 128</button>
      <button class="format-tab" data-fmt="EAN13" onclick="setFormat(this)">EAN-13</button>
    </div>

    <!-- Input -->
    <div class="field-label">
      Input Value
      <span class="field-hint" id="inputHint">Any text or number</span>
    </div>
    <input type="text" id="barcodeInput" placeholder="Enter value..." oninput="onInput()" />
    <div class="error-msg" id="errMsg"></div>

    <!-- Info box for EAN-13 -->
    <div class="info-box" id="eanInfo">
      EAN-13 requires exactly 12 digits — the 13th check digit is auto-calculated and appended.
    </div>

    <!-- Options -->
    <div class="options-row">
      <div class="option-group">
        <label>Bar Height</label>
        <input type="number" id="barHeight" value="80" min="20" max="200" step="5"/>
      </div>
      <div class="option-group">
        <label>Width Scale</label>
        <div class="select-wrap">
          <select id="barWidth">
            <option value="1">Narrow (1×)</option>
            <option value="2" selected>Normal (2×)</option>
            <option value="3">Wide (3×)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" id="showText" checked />
        Show text below
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="flatBg" checked />
        White background
      </label>
    </div>

    <button class="gen-btn" onclick="generate()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="3" width="2.5" height="10" fill="white"/>
        <rect x="5" y="3" width="1" height="10" fill="white"/>
        <rect x="7.5" y="3" width="2.5" height="10" fill="white"/>
        <rect x="11.5" y="3" width="1" height="10" fill="white"/>
        <rect x="13.5" y="3" width="1.5" height="10" fill="white"/>
      </svg>
      Generate Barcode
    </button>
  </div>

  <!-- Output -->
  <div class="output-card" id="outputCard">
    <div class="output-header">
      <span class="output-label" id="outLabel">CODE 128</span>
      <span class="output-meta" id="outMeta"></span>
    </div>
    <div class="barcode-stage">
      <div class="barcode-wrap">
        <svg id="barcodeSvg"></svg>
      </div>
    </div>
    <div class="dl-row">
      <button class="dl-btn dl-svg" onclick="downloadSVG()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
          <path d="M6.5 9L2.5 5h2.5V1h3v4h2.5L6.5 9z"/>
          <rect x="1" y="10" width="11" height="2" rx="1"/>
        </svg>
        SVG
      </button>
      <button class="dl-btn dl-png" onclick="downloadPNG()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor">
          <path d="M6.5 9L2.5 5h2.5V1h3v4h2.5L6.5 9z"/>
          <rect x="1" y="10" width="11" height="2" rx="1"/>
        </svg>
        PNG
      </button>
    </div>
  </div>

  <p class="footer-note">// offline · no data sent · pure client-side</p>

</div>

<script>
  let currentFormat = 'CODE128';

  function setFormat(btn) {
    document.querySelectorAll('.format-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFormat = btn.dataset.fmt;
    updateHints();
    clearError();
    document.getElementById('outputCard').classList.remove('visible');
  }

  function updateHints() {
    const hint = document.getElementById('inputHint');
    const info = document.getElementById('eanInfo');
    const input = document.getElementById('barcodeInput');
    if (currentFormat === 'EAN13') {
      hint.textContent = '12 digits (check digit auto-added)';
      info.classList.add('visible');
      input.placeholder = '012345678901';
    } else {
      hint.textContent = 'Any text or number';
      info.classList.remove('visible');
      input.placeholder = 'Enter value...';
    }
  }

  function clearError() {
    document.getElementById('errMsg').textContent = '';
    document.getElementById('barcodeInput').classList.remove('error');
  }

  function showError(msg) {
    document.getElementById('errMsg').innerHTML = '⚠ ' + msg;
    document.getElementById('barcodeInput').classList.add('error');
  }

  function onInput() {
    clearError();
    const val = document.getElementById('barcodeInput').value;
    if (currentFormat === 'EAN13' && val.length === 12 && /^\d{12}$/.test(val)) {
      generate();
    }
  }

  function calcEAN13Check(digits12) {
    let sum = 0;
    for (let i = 0; i < 12; i++) {
      sum += parseInt(digits12[i]) * (i % 2 === 0 ? 1 : 3);
    }
    return ((10 - (sum % 10)) % 10).toString();
  }

  function generate() {
    clearError();
    const rawVal = document.getElementById('barcodeInput').value.trim();
    if (!rawVal) { showError('Please enter a value.'); return; }

    const height = parseInt(document.getElementById('barHeight').value) || 80;
    const width  = parseInt(document.getElementById('barWidth').value) || 2;
    const showText = document.getElementById('showText').checked;
    const flatBg   = document.getElementById('flatBg').checked;

    let value = rawVal;
    let metaText = '';

    if (currentFormat === 'EAN13') {
      if (!/^\d+$/.test(rawVal)) { showError('EAN-13 requires digits only.'); return; }
      if (rawVal.length === 13) {
        value = rawVal;
        metaText = 'EAN-13 · ' + rawVal;
      } else if (rawVal.length === 12) {
        const check = calcEAN13Check(rawVal);
        value = rawVal + check;
        metaText = 'EAN-13 · ' + value + ' (check: ' + check + ')';
      } else {
        showError('EAN-13 needs exactly 12 digits (check digit is auto-added).');
        return;
      }
    } else {
      metaText = 'CODE-128 · ' + value.length + ' char' + (value.length !== 1 ? 's' : '');
    }

    try {
      JsBarcode('#barcodeSvg', value, {
        format: currentFormat === 'EAN13' ? 'EAN13' : 'CODE128',
        width: width,
        height: height,
        displayValue: showText,
        background: flatBg ? '#ffffff' : 'transparent',
        lineColor: '#1a1714',
        margin: 10,
        fontSize: 14,
        fontOptions: 'monospace',
        textMargin: 6,
      });

      document.getElementById('outLabel').textContent = currentFormat === 'EAN13' ? 'EAN-13' : 'CODE 128';
      document.getElementById('outMeta').textContent = metaText;
      document.getElementById('outputCard').classList.add('visible');
    } catch (e) {
      showError('Could not generate barcode: ' + e.message);
    }
  }

  function downloadSVG() {
    const svg = document.getElementById('barcodeSvg');
    const data = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([data], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'barcode.svg';
    a.click();
    URL.revokeObjectURL(url);
  }

  function downloadPNG() {
    const svg = document.getElementById('barcodeSvg');
    const bbox = svg.getBoundingClientRect();
    const scale = 3;
    const canvas = document.createElement('canvas');
    canvas.width  = svg.width.baseVal.value  * scale || 400;
    canvas.height = svg.height.baseVal.value * scale || 200;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const data = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'barcode.png';
      a.click();
    };
    img.src = url;
  }

  // Allow Enter key
  document.getElementById('barcodeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
</script>
</body>
</html>
